name: go-library

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v1
        with:
          go-version: "1.14"
      - uses: actions/cache@v1
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-library-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-library-
      - name: Install dependencies
        run: go mod download
      - name: Lint
        run: |
          if [[ -n "$(gofmt -l .)" ]]; then
            exit 1
          fi
      - name: Run tests
        run: go test -v ./...
